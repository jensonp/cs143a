<text xml:space="preserve" text-anchor="middle" x="862.12" y="-95.7" font-family="Helvetica,sans-Serif" font-size="14.00" fill="#233238">Key idea:</text>
<text xml:space="preserve" text-anchor="middle" x="862.12" y="-80.7" font-family="Helvetica,sans-Serif" font-size="14.00" fill="#233238">interfaces vary freely,</text>
<text xml:space="preserve" text-anchor="middle" x="862.12" y="-65.7" font-family="Helvetica,sans-Serif" font-size="14.00" fill="#233238">service semantics stay stable,</text>
<text xml:space="preserve" text-anchor="middle" x="862.12" y="-50.7" font-family="Helvetica,sans-Serif" font-size="14.00" fill="#233238">protected effects must pass</text>
<text xml:space="preserve" text-anchor="middle" x="862.12" y="-35.7" font-family="Helvetica,sans-Serif" font-size="14.00" fill="#233238">through a small syscall surface</text>
<text xml:space="preserve" text-anchor="middle" x="862.12" y="-20.7" font-family="Helvetica,sans-Serif" font-size="14.00" fill="#233238">so the kernel can validate and</text>
<text xml:space="preserve" text-anchor="middle" x="862.12" y="-5.7" font-family="Helvetica,sans-Serif" font-size="14.00" fill="#233238">commit updates to authoritative state.</text>
</g>
